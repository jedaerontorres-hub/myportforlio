<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory 4</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="container">
    <h1>Calculator</h1>

    <div class="calculator">
      <input type="text" id="display" disabled>

       <div class="buttons">
            <button class="wide" onclick="clearDisplay()">AC</button>
            <button onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">x</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>

            <button class="zero" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <div class="instructions">
      <h2>Instructions / User Guide</h2>
      <p>• Click numbers to input values.</p>
      <p>• Use +, -, *, ÷ for operations.</p>
      <p>• Press "=" to calculate result.</p>
      <p>• Press "AC" to clear the screen.</p>
      <p>• Keyboard input is supported.</p>
    </div>

     <script>
        let display = document.getElementById("display");

        function appendValue(value) {
        display.value += value;
        }

        function clearDisplay() {
        display.value = "";
        }

        function calculate() {
        try {
            let result = eval(display.value);

            if (!isFinite(result)) {
            display.value = "Error";
            } else {
            display.value = result;
            }

        } catch {
            display.value = "Error";
        }
        }

        document.addEventListener("keydown", function(event) {
        const key = event.key;

        if (!isNaN(key) || "+-*/.".includes(key)) {
            appendValue(key);
        } else if (key === "Enter") {
            calculate();
        } else if (key === "Backspace") {
            display.value = display.value.slice(0, -1);
        } else if (key === "Escape") {
            clearDisplay();
        }
        });
    </script>
</body>
</html>
