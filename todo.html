<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      margin-top: 50px;
    }

    .todo-container {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 10px;
      cursor: pointer;
      background: #00bfff;
      border: none;
      color: white;
      border-radius: 5px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #eee;
      margin: 10px 0;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    li button {
      background: red;
    }
  </style>
</head>
<body>

<div class="todo-container">
  <h2>To-Do List</h2>
  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>
  <ul id="taskList"></ul>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let task = input.value;

  if (task === "") return;

  let li = document.createElement("li");
  li.innerHTML = `${task} <button onclick="this.parentElement.remove()">X</button>`;

  document.getElementById("taskList").appendChild(li);
  input.value = "";
}
</script>

</body>
</html>
