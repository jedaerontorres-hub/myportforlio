<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Clock</title>
  <style>
    body {
      background: #111;
      color: #00bfff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .clock {
      font-size: 60px;
      font-weight: bold;
      background: #000;
      padding: 20px 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px #00bfff;
    }
  </style>
</head>
<body>

<div class="clock" id="time"></div>

<script>
function updateClock() {
  let now = new Date();
  let time = now.toLocaleTimeString();
  document.getElementById("time").textContent = time;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
